<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かやちゃんの家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card: #1a1826;
    --card2: #221f33;
    --accent1: #ff6b9d;
    --accent2: #c77dff;
    --accent3: #72efdd;
    --accent4: #ffd166;
    --text: #fffffe;
    --muted: #a7a3c2;
    --border: rgba(255,255,255,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(199,125,255,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,157,0.1) 0%, transparent 50%);
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    color: white;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
  }
  textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.9rem;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent2); }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card2);
  }
  .upload-area:hover { border-color: var(--accent2); }
  .upload-area.has-image { border-color: var(--accent3); border-style: solid; }
  .upload-emoji { font-size: 2rem; margin-bottom: 8px; }
  .upload-text { color: var(--muted); font-size: 0.85rem; }
  #fileInput { display: none; }
  #previewImg {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 6px;
  }

  .result-area { margin-top: 16px; }
  .result-title {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .entry-card {
    background: var(--card2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .entry-category {
    font-size: 0.8rem;
    padding: 2px 10px;
    border-radius: 999px;
    background: rgba(199,125,255,0.15);
    color: var(--accent2);
    font-weight: 700;
  }
  .entry-amount {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent3);
  }
  .entry-details {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .entry-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .edit-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }
  .edit-row input, .edit-row select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.8rem;
    padding: 6px 10px;
    outline: none;
    width: 100%;
  }
  .edit-row input:focus, .edit-row select:focus { border-color: var(--accent2); }
  .edit-row.full { grid-template-columns: 1fr; }

  .status-msg {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.85rem;
    margin-top: 12px;
    font-weight: 700;
  }
  .status-msg.success { background: rgba(114,239,221,0.15); color: var(--accent3); }
  .status-msg.error { background: rgba(255,107,157,0.15); color: var(--accent1); }
  .status-msg.loading { background: rgba(199,125,255,0.1); color: var(--accent2); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(199,125,255,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.6;
    padding: 10px 12px;
    background: var(--card2);
    border-radius: 8px;
  }
  .hint strong { color: var(--accent4); }
</style>
</head>
<body>

<h1>💰 かやちゃんの家計簿</h1>
<p class="subtitle">// Claude powered · 話しかけるだけで記録</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('text')">💬 テキスト入力</button>
  <button class="tab" onclick="switchTab('receipt')">🧾 レシート読み取り</button>
</div>

<!-- テキスト入力 -->
<div class="panel active" id="text">
  <div class="card">
    <div class="card-label">今日使ったお金を話しかけてね</div>
    <textarea id="textInput" rows="4" placeholder="例：マツキヨで日用品570円PayPay、セブンでコーヒー180円現金、夜に焼肉3500円カード"></textarea>
    <div class="hint">
      <strong>ポイント：</strong>店名・金額・支払方法を入れると精度UP！<br>
      日付を言わなければ今日の日付で記録されるよ。
    </div>
    <div class="hint" style="margin-top:8px;">
      <strong>カテゴリ一覧：</strong><br>
      ローン返済／必須食費🍳／外食費🍔／おやつ・酒(間食)🍺／日用・消耗品／家賃光熱費系／医療費🏥／交通費🚃／交際費🤝／サブスク／税金／ゲーム／電子機器／コンテンツ購入／ｲﾍﾞﾝﾄ・推し活／美容／ファッション／その他娯楽／その他
    </div>
  </div>
  <button class="btn" id="textBtn" onclick="parseText()">✨ Claudeに解析してもらう</button>
  <div id="textStatus"></div>
  <div id="textResult" class="result-area"></div>
</div>

<!-- レシート読み取り -->
<div class="panel" id="receipt">
  <div class="card">
    <div class="card-label">レシートの写真をアップロード</div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-emoji">📷</div>
      <div class="upload-text">タップして写真を選択</div>
      <img id="previewImg" alt="preview">
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  </div>
  <button class="btn" id="receiptBtn" onclick="parseReceipt()" disabled>🧾 レシートを読み取る</button>
  <div id="receiptStatus"></div>
  <div id="receiptResult" class="result-area"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxkFEiFVyR7H7LQOJgw1Wh06i1ZvjLZjEmczDScWVN1hS9WZb1NbMxd25ADKTTt9WTj/exec";

const CATEGORIES = [
  "ローン返済", "必須食費🍳", "外食費🍔", "おやつ・酒(間食)🍺",
  "日用・消耗品", "家賃光熱費系", "医療費🏥", "交通費🚃",
  "交際費🤝", "サブスク", "税金", "ゲーム",
  "電子機器", "コンテンツ購入", "ｲﾍﾞﾝﾄ・推し活", "美容",
  "ファッション", "その他娯楽", "その他"
];

const PAYMENTS = ["PayPay", "PASMO", "カード", "現金", "口座"];

let parsedEntries = [];
let receiptEntries = [];
let receiptImageBase64 = null;

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="status-msg ${type}">${msg}</div>`;
}

async function callClaude(messages, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });
  const data = await res.json();
  return data.content[0].text;
}

// テキスト解析
async function parseText() {
  const input = document.getElementById('textInput').value.trim();
  if (!input) return;

  const btn = document.getElementById('textBtn');
  btn.disabled = true;
  setStatus('textStatus', '<span class="spinner"></span>Claudeが解析中...', 'loading');
  document.getElementById('textResult').innerHTML = '';

  const system = `あなたは家計簿の入力補助AIです。ユーザーの発言から支出情報を抽出してJSON配列で返してください。
カテゴリは必ず以下から選んでください：${CATEGORIES.join('、')}
支払方法は必ず以下から選んでください：${PAYMENTS.join('、')}
日付が明示されていない場合は今日の日付（${today()}）を使ってください。
必ずJSON配列のみ返してください。他の文章は不要です。
形式：[{"date":"yyyy/mm/dd","category":"カテゴリ","store":"店舗名","description":"内容","payment":"支払方法","amount":金額,"memo":""}]`;

  try {
    const raw = await callClaude([{ role: "user", content: input }], system);
    const clean = raw.replace(/```json|```/g, '').trim();
    parsedEntries = JSON.parse(clean);
    renderEntries('textResult', parsedEntries, 'text');
    setStatus('textStatus', `${parsedEntries.length}件を解析したよ！内容を確認して記録してね。`, 'success');
  } catch(e) {
    setStatus('textStatus', '解析に失敗しちゃった…もう一度試してみて！', 'error');
  }
  btn.disabled = false;
}

// レシート処理
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    receiptImageBase64 = ev.target.result.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('uploadArea').classList.add('has-image');
    document.getElementById('uploadArea').querySelector('.upload-text').textContent = '画像を変更するにはタップ';
    document.getElementById('receiptBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function parseReceipt() {
  if (!receiptImageBase64) return;

  const btn = document.getElementById('receiptBtn');
  btn.disabled = true;
  setStatus('receiptStatus', '<span class="spinner"></span>レシートを読み取り中...', 'loading');
  document.getElementById('receiptResult').innerHTML = '';

  const system = `あなたは家計簿の入力補助AIです。レシート画像から支出情報を抽出してJSON配列で返してください。
カテゴリは必ず以下から選んでください：${CATEGORIES.join('、')}
支払方法は必ず以下から選んでください：${PAYMENTS.join('、')}
日付がレシートに記載されていない場合は今日の日付（${today()}）を使ってください。
レシートの合計金額を1件として記録してください（品目ごとではなく）。
必ずJSON配列のみ返してください。他の文章は不要です。
形式：[{"date":"yyyy/mm/dd","category":"カテゴリ","store":"店舗名","description":"内容","payment":"支払方法","amount":金額,"memo":""}]`;

  try {
    const raw = await callClaude([{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: receiptImageBase64 } },
        { type: "text", text: "このレシートの内容を家計簿に記録してください。" }
      ]
    }], system);
    const clean = raw.replace(/```json|```/g, '').trim();
    receiptEntries = JSON.parse(clean);
    renderEntries('receiptResult', receiptEntries, 'receipt');
    setStatus('receiptStatus', `${receiptEntries.length}件を読み取ったよ！内容を確認して記録してね。`, 'success');
  } catch(e) {
    setStatus('receiptStatus', '読み取りに失敗しちゃった…もう一度試してみて！', 'error');
  }
  btn.disabled = false;
}

function renderEntries(containerId, entries, type) {
  const container = document.getElementById(containerId);
  if (!entries.length) { container.innerHTML = ''; return; }

  let html = `<div class="result-title">// 解析結果 · 修正してから記録してね</div>`;

  entries.forEach((e, i) => {
    const catOptions = CATEGORIES.map(c => `<option value="${c}" ${c===e.category?'selected':''}>${c}</option>`).join('');
    const payOptions = PAYMENTS.map(p => `<option value="${p}" ${p===e.payment?'selected':''}>${p}</option>`).join('');

    html += `
    <div class="entry-card">
      <div class="entry-top">
        <span class="entry-category">${e.category}</span>
        <span class="entry-amount">¥${Number(e.amount).toLocaleString()}</span>
      </div>
      <div class="entry-details">${e.store} · ${e.description}</div>
      <div class="entry-date">${e.date} · ${e.payment}</div>
      <div class="edit-row">
        <select onchange="updateEntry('${type}',${i},'category',this.value)">${catOptions}</select>
        <select onchange="updateEntry('${type}',${i},'payment',this.value)">${payOptions}</select>
      </div>
      <div class="edit-row">
        <input type="text" value="${e.store}" placeholder="店舗名" onchange="updateEntry('${type}',${i},'store',this.value)">
        <input type="number" value="${e.amount}" placeholder="金額" onchange="updateEntry('${type}',${i},'amount',Number(this.value))">
      </div>
      <div class="edit-row full">
        <input type="text" value="${e.memo||''}" placeholder="メモ（任意）" onchange="updateEntry('${type}',${i},'memo',this.value)">
      </div>
    </div>`;
  });

  html += `<button class="btn" onclick="saveEntries('${type}')">📝 スプシに記録する</button>`;
  container.innerHTML = html;
}

function updateEntry(type, i, key, val) {
  const entries = type === 'text' ? parsedEntries : receiptEntries;
  entries[i][key] = val;
}

async function saveEntries(type) {
  const entries = type === 'text' ? parsedEntries : receiptEntries;
  const statusId = type === 'text' ? 'textStatus' : 'receiptStatus';

  setStatus(statusId, '<span class="spinner"></span>スプシに記録中...', 'loading');

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rows: entries }),
      mode: "no-cors"
    });

    setStatus(statusId, `✅ ${entries.length}件をスプシに記録したよ！`, 'success');
    document.getElementById(type === 'text' ? 'textResult' : 'receiptResult').innerHTML = '';
    if (type === 'text') document.getElementById('textInput').value = '';

  } catch(e) {
    setStatus(statusId, '記録に失敗しちゃった…GASのURLを確認してみて！', 'error');
  }
}
</script>
</body>
</html>
